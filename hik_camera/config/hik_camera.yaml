# 海康相机驱动参数（与 sentry_vision/config/camera.yaml 对齐）
/**:
  ros__parameters:
    exposure_time: 8000.0       # 曝光时间 (微秒)
    gain: 10.0                 # 增益 (0-96)
    frame_rate: 120.0          # 帧率
    image_width: 1440
    image_height: 1080

    # 发布的 topic 名称（与 sentry_vision 订阅端一致）
    camera_topics:
      - "/mvsua_cam/image_raw2"
      - "/mvsua_cam/image_raw3"
      - "/mvsua_cam/image_raw4"
