# 单相机调试模式 —— 只用 1 台相机跑全向感知
/**:
  ros__parameters:
    # 相机数量
    camera_count: 1

    # 海康相机参数
    exposure_time: 8000.0      # 曝光时间 (微秒)
    gain: 10.0                 # 增益
    frame_rate: 210.0          # 帧率

    # 只需要设置第一路（其余不使用）
    img1_topic_name: "/mvsua_cam/image_raw2"
    img2_topic_name: "/mvsua_cam/image_raw3"
    img3_topic_name: "/mvsua_cam/image_raw4"

    # 网络参数（和 ml.yaml 一致，可单独调）
    yolo_name: yolov5
    yolov5_model_path: assets/yolov5.xml
    yolov8_model_path: assets/yolov8.xml
    yolo11_model_path: assets/yolo11.xml
    device: GPU
    min_confidence: 0.8
    nms_threshold: 0.6
    input_width: 640
    input_height: 640
    num_classes: 13
    num_keypoints: 4
    kpt_channels: 2
    has_objectness: true
    apply_sigmoid: true

    # 融合参数
    sync_timeout: 0.08
    duplicate_distance_thresh: 0.4
    publish_rate: 30.0
